<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Eastern - Animation Company</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #FF8C42;
            --primary-gold: #FFD166;
            --accent-pink: #FF006E;
            --accent-cyan: #00D9FF;
            --dark-bg: #0a0e27;
            --light-text: #ffffff;
            --text-muted: #b0b9c3;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--dark-bg);
            color: var(--light-text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateY(0);
            opacity: 1;
            font-family: 'Futura', 'Futura PT', 'Century Gothic', sans-serif;
            height: 70px;
        }

        nav.hidden {
            transform: translateY(-85px);
            opacity: 0;
        }

        nav.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary-gold), var(--primary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
            margin-right: auto;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: 'Futura', 'Futura PT', 'Century Gothic', sans-serif;
            transition: color 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--primary-gold);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary-gold);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        .nav-logo {
            height: 70px;
            width: auto;
            object-fit: contain;
            animation: slideInRight 0.8s ease-out;
        }

        @media (max-width: 768px) {
            nav ul {
                gap: 1.5rem;
            }
            nav a {
                font-size: 0.8rem;
            }
        }

        /* Sections */
        section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            animation: elasticFadeIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
            z-index: -1;
        }

        /* Hero Section */
        #hero::before {
            background-image: url('page1.jpg');
            opacity: 1;
        }

        .hero-content {
            text-align: center;
            z-index: 10;
        }

        .hero-content h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1.1;
            margin-bottom: 2rem;
            color: var(--light-text);
            text-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .hero-content p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Mission Section */
        #mission::before {
            background-image: url('page3.jpg');
        }

        .mission-content {
            max-width: 800px;
            z-index: 10;
        }

        .mission-content h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .mission-content p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.95);
        }

        /* Services Section */
        #services::before {
            background-image: url('page4.jpg');
        }

        .services-container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            z-index: 10;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .service-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: var(--primary-gold);
        }

        .service-item h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary-gold);
            font-weight: 700;
        }

        .service-item p {
            color: var(--text-muted);
            line-height: 1.7;
        }

        .services-header h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .services-header p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* Team Section */
        #team::before {
            background-image: url('page5.jpg');
        }

        .team-content {
            max-width: 900px;
            z-index: 10;
        }

        .team-content h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .team-content p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .team-highlight {
            color: var(--primary-gold);
            font-weight: 700;
        }

        /* Showreel Section */
        #showreel::before {
            background-image: url('page2.jpg');
        }

        .showreel-content {
            text-align: center;
            z-index: 10;
        }

        .showreel-content h2 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .play-btn::after {
            content: '▶';
            color: white;
            font-size: 1.5rem;
            margin-left: 4px;
        }

        #contact::before {
            background-image: url('page6.jpg');
        }

        .contact-content {
            max-width: 900px;
            z-index: 10;
        }

        .contact-content h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .contact-content p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .contact-info {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .contact-item {
            margin-bottom: 1.5rem;
        }

        .contact-item strong {
            color: var(--primary-gold);
        }

        .contact-item a {
            color: var(--light-text);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .contact-item a:hover {
            color: var(--primary-gold);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes elasticSlideIn {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes elasticBounce {
            0% {
                transform: scale(0.8) translateY(30px);
                opacity: 0;
            }
            50% {
                transform: scale(1.02);
            }
            75% {
                transform: scale(0.98);
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes elasticFadeIn {
            0% {
                opacity: 0;
                transform: translateY(60px) scaleY(0.8);
            }
            60% {
                opacity: 1;
                transform: translateY(-10px) scaleY(1.05);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scaleY(1);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Scroll Indicator */
        .scroll-indicator {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: var(--primary-gold);
            fill: none;
            stroke-width: 2;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            nav {
                padding: 1rem;
            }

            nav ul {
                display: none;
            }

            section {
                padding: 2rem;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .scroll-indicator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#hero">Home</a></li>
            <li><a href="#showreel">Showreel</a></li>
            <li><a href="#mission">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#team">Team</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <img src="logo_d.png" alt="Logo" class="nav-logo">
    </nav>

    <!-- Hero Section -->
    <section id="hero">
    </section>

    <!-- Showreel Section -->
    <section id="showreel">
    </section>

    <!-- Mission Section -->
    <section id="mission">
    </section>

    <!-- Services Section -->
    <section id="services">
    </section>

    <!-- Team Section -->
    <section id="team">
    </section>

    <!-- Contact Section -->
    <section id="contact">
    </section>

    <!-- Scroll Indicator -->
    <div class="scroll-indicator">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 19l-7-7m7 7l7-7M12 5v14" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>

    <script>
        // Navbar hide/show on scroll
        const nav = document.querySelector('nav');
        let lastScrollTop = 0;
        let isHidden = false;
        let scrollTimeout;

        window.addEventListener('scroll', () => {
            let currentScroll = window.pageYOffset || document.documentElement.scrollTop;

            // Hide navbar on any scroll (both up and down)
            if (currentScroll > 100) {
                if (!isHidden) {
                    nav.classList.add('hidden');
                    nav.classList.remove('visible');
                    isHidden = true;
                }
            } else {
                // Near top of page - always show
                nav.classList.remove('hidden');
                nav.classList.add('visible');
                isHidden = false;
            }

            lastScrollTop = currentScroll <= 0 ? 0 : currentScroll;

            // Clear previous timeout
            clearTimeout(scrollTimeout);

            // Show navbar when scroll stops
            scrollTimeout = setTimeout(() => {
                nav.classList.remove('hidden');
                nav.classList.add('visible');
                isHidden = false;
            }, 800); // Show after 800ms of no scrolling

            // Animate sections on scroll with elastic effect
            const sections = document.querySelectorAll('section');
            sections.forEach((section, index) => {
                const sectionTop = section.getBoundingClientRect().top;
                const sectionBottom = section.getBoundingClientRect().bottom;
                const isVisible = sectionTop < window.innerHeight && sectionBottom > 0;
                
                if (isVisible && !section.classList.contains('animated')) {
                    section.classList.add('animated');
                    // Alternate elastic animations for each section
                    const animations = ['elasticFadeIn', 'elasticBounce', 'elasticSlideIn'];
                    const animation = animations[index % animations.length];
                    section.style.animation = `${animation} 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`;
                }
            });

            // Hide scroll indicator after first scroll
            let hasScrolled = false;
            const scrollIndicator = document.querySelector('.scroll-indicator');
            
            if (!hasScrolled && window.scrollY > 100) {
                hasScrolled = true;
                scrollIndicator.style.opacity = '0';
                scrollIndicator.style.pointerEvents = 'none';
            }
        });

        // Active navigation link tracking
        const sections = document.querySelectorAll('section');
        const navLinks = document.querySelectorAll('nav a');

        window.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 200) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.style.color = 'var(--text-muted)';
                if (link.getAttribute('href').slice(1) === current) {
                    link.style.color = 'var(--primary-gold)';
                }
            });
        });
    </script>
</body>
</html>
